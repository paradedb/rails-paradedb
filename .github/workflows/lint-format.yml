# workflows/lint-format.yml
#
# Lint Format
# Lint the project's file trailing spaces, line endings, and format.

name: Lint Format

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: lint-format-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint File Endings & Trailing Whitespaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Check for CRLF Files
        run: |
          FILES=$(git ls-files --eol | grep crlf || true)
          if [[ ! -z "$FILES" ]]; then
            echo "The following files have incorrect line endings:"
            echo "$FILES"
            false
          fi

      - name: Check for Trailing Whitespaces
        run: |
          FILES=$(git grep -Ilr '[[:blank:]]$' -- \
            ':(exclude)*.nix' \
            ':(exclude)*.sql' \
            ':(exclude)*.out' \
            ':(exclude)*.rs' \
            ':(exclude)docker/manifests/**' || true)
          if [[ ! -z "$FILES" ]]; then
            echo "The following files have trailing whitespaces:"
            echo "$FILES"
            exit 1
          fi

      - name: Check for Missing Final Newlines
        run: |
          python3 - <<'PY'
          import pathlib
          import subprocess
          import sys

          missing = []
          for name in subprocess.check_output(["git", "ls-files"], text=True).splitlines():
              path = pathlib.Path(name)
              if not path.is_file():
                  continue
              data = path.read_bytes()
              if data and not data.endswith(b"\n"):
                  missing.append(name)

          if missing:
              print("The following files are missing a trailing newline:")
              for name in missing:
                  print(name)
              sys.exit(1)
          PY
