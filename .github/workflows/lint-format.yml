# workflows/lint-format.yml
#
# Lint Format
# Lint the project's file trailing spaces, line endings, and format.

name: Lint Format

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: lint-format-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint File Endings & Trailing Whitespaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Check for CRLF Files
        run: |
          FILES=$(git ls-files --eol | grep crlf || true)
          if [[ ! -z "$FILES" ]]; then
            echo "The following files have incorrect line endings:"
            echo "$FILES"
            false
          fi

      - name: Check for Trailing Whitespaces
        run: |
          FILES=$(git grep -Ilr '[[:blank:]]$' -- \
            ':(exclude)*.nix' \
            ':(exclude)*.sql' \
            ':(exclude)*.out' \
            ':(exclude)*.rs' \
            ':(exclude)docker/manifests/**' || true)
          if [[ ! -z "$FILES" ]]; then
            echo "The following files have trailing whitespaces:"
            echo "$FILES"
            exit 1
          fi

      - name: Check for Missing Trailing Newlines
        run: |
          python3 - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          raw = subprocess.check_output(["git", "ls-files", "-z"])
          candidates = [Path(p) for p in raw.decode("utf-8", errors="ignore").split("\0") if p]
          missing_newline = []

          for path in candidates:
            data = path.read_bytes()
            if not data:
              continue
            if b"\0" in data:
              continue
            if not data.endswith(b"\n"):
              missing_newline.append(str(path))

          if missing_newline:
            print("The following files are missing a trailing newline:")
            for file in missing_newline:
              print(file)
            sys.exit(1)
          PY
