name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres

jobs:
  matrix-tests:
    name: Ruby ${{ matrix.ruby-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Rails 8.1 supports Ruby 3.2+
          - ruby-version: "3.2"
          - ruby-version: "3.3"
          - ruby-version: "3.4"
          - ruby-version: "4.0"

    services:
      paradedb:
        image: paradedb/paradedb:0.21.4-pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      PARADEDB_TEST_DSN: postgresql://postgres:postgres@localhost:5432/postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run unit tests
        run: bundle exec rake test

      - name: Run integration tests
        run: bundle exec rake test:integration

      - name: Install example dependencies
        run: BUNDLE_GEMFILE=examples/Gemfile bundle install

      # NOTE: Examples temporarily disabled until index creation DSL/migrations are implemented.
      # The examples require proper BM25 index setup which is not yet available via the Rails API.
      # TODO: Re-enable examples once index creation DSL is implemented (see feedback.md).
