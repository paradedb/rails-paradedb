# workflows/check-typo.yml
#
# Check Typo
# Check Typo using codespell.

name: Check Typo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: check-typo-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-typo:
    name: Check Typo using codespell
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install codespell
        run: python -m pip install --upgrade codespell

      - name: Check Typo using codespell
        run: codespell --check-filenames --config .codespellrc
