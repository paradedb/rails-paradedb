version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      bundler-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/examples"
    schedule:
      interval: "monthly"
    groups:
      bundler-examples-dependencies:
        patterns:
          - "*"
